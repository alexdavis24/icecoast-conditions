name: Deploy

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-dev"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve release settings
        id: release
        shell: bash
        run: |
          set -euo pipefail

          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          frontend_repo="ghcr.io/${owner}/icecoast-conditions-frontend"
          backend_repo="ghcr.io/${owner}/icecoast-conditions-backend"
          short_sha="$(git rev-parse --short=12 HEAD)"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            environment="dev"
            compose_project="icecoast-dev"
            frontend_port="3001"
            backend_port="8001"
            alias_tag="dev"
            image_tag="sha-${short_sha}"
          else
            ref_name="${GITHUB_REF_NAME}"

            if [[ "$ref_name" == *-dev ]]; then
              environment="dev"
              compose_project="icecoast-dev"
              frontend_port="3001"
              backend_port="8001"
              alias_tag="dev"
            else
              environment="prod"
              compose_project="icecoast-prod"
              frontend_port="3000"
              backend_port="8000"
              alias_tag="latest"
            fi

            image_tag="$ref_name"
          fi

          {
            echo "environment=$environment"
            echo "compose_project=$compose_project"
            echo "frontend_port=$frontend_port"
            echo "backend_port=$backend_port"
            echo "frontend_image_exact=${frontend_repo}:${image_tag}"
            echo "frontend_image_alias=${frontend_repo}:${alias_tag}"
            echo "backend_image_exact=${backend_repo}:${image_tag}"
            echo "backend_image_alias=${backend_repo}:${alias_tag}"
          } >>"$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./src/frontend
          file: ./src/frontend/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ steps.release.outputs.frontend_image_exact }}
            ${{ steps.release.outputs.frontend_image_alias }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./src/backend
          file: ./src/backend/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ steps.release.outputs.backend_image_exact }}
            ${{ steps.release.outputs.backend_image_alias }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          ping: ${{ secrets.TAILSCALE_IP }}

      - name: Set up SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Diagnose Tailscale SSH reachability
        shell: bash
        env:
          TAILSCALE_IP: ${{ secrets.TAILSCALE_IP }}
        run: |
          set -euo pipefail

          tailscale status

          for attempt in {1..6}; do
            if nc -zvw5 "$TAILSCALE_IP" 22; then
              echo "SSH port is reachable on attempt $attempt."
              break
            fi

            if [[ "$attempt" -eq 6 ]]; then
              echo "SSH on port 22 is not reachable at $TAILSCALE_IP." >&2
              exit 1
            fi

            echo "SSH on port 22 is not reachable yet; retrying in 5 seconds."
            sleep 5
          done

      - name: Trust SSH host key if available
        shell: bash
        run: |
          ssh-keyscan -T 30 -H "${{ secrets.TAILSCALE_IP }}" >> ~/.ssh/known_hosts || true

      - name: Sync deployment assets
        shell: bash
        run: |
          RSYNC_RSH="ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30" \
            rsync -avz --delete ./deploy/ "${{ secrets.SSH_USER }}@${{ secrets.TAILSCALE_IP }}:~/icecoast-conditions-deploy/"

      - name: Deploy release
        shell: bash
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 "${{ secrets.SSH_USER }}@${{ secrets.TAILSCALE_IP }}" \
            "BACKEND_IMAGE='${{ steps.release.outputs.backend_image_exact }}' \
            BACKEND_PORT='${{ steps.release.outputs.backend_port }}' \
            COMPOSE_FILE='\$HOME/icecoast-conditions-deploy/compose.yml' \
            COMPOSE_PROJECT_NAME='${{ steps.release.outputs.compose_project }}' \
            DEPLOY_ROOT='\$HOME/icecoast-conditions/${{ steps.release.outputs.environment }}' \
            FRONTEND_IMAGE='${{ steps.release.outputs.frontend_image_exact }}' \
            FRONTEND_PORT='${{ steps.release.outputs.frontend_port }}' \
            GHCR_TOKEN='${{ secrets.GHCR_TOKEN }}' \
            GHCR_USERNAME='${{ secrets.GHCR_USERNAME }}' \
            POSTGRES_PASSWORD='${{ secrets.POSTGRES_PASSWORD }}' \
            bash '\$HOME/icecoast-conditions-deploy/remote-deploy.sh'"
