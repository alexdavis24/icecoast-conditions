services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: icecoast
      POSTGRES_USER: icecoast
      POSTGRES_PASSWORD: icecoast
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icecoast -d icecoast"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./src/backend
    environment:
      DATABASE_URL: postgresql://icecoast:icecoast@postgres:5432/icecoast
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./src/frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  postgres-data:
